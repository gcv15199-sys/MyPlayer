<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Player</title>
    <link rel="stylesheet" href="style.css">
</head>

<body style="background-color: black;">
    <div id="homePage">

        <div id="searchBar"></div>

        <div id="artistSection"></div>

        <div id="favoriteSection"></div>

        <div id="recentSection"></div>

    </div>

    <div id="playerPage">

        <div id="left">

            <div id="player">

                <video id="video"></video>

                <div id="controls">

                    <button id="playButton">▶</button>

                    <input id="progress" type="range">

                </div>

            </div>

            <div id="videoInfo">

                <div id="title"></div>

                <div id="author"></div>

                <div id="taps"></div>

            </div>
        </div>

        <div id="right">

            <div id="playlist">

            </div>

        </div>

    </div>

    <div id="artistPage"></div>

    <script src="script.js"></script>
</body>

</html>
